services:
  # Java Backend
  - type: web
    name: resume-analyzer-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8080
      - key: AI_SERVICE_URL
        value: https://resume-analyzer-ai-service.onrender.com


      - key: AI_SERVICE_KEY
        value: dev-internal-key-change-in-production

  # Python AI Service
  - type: web
    name: resume-analyzer-ai-service
    env: docker
    dockerContext: ai-service
    dockerfilePath: ai-service/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8000
      - key: AI_SERVICE_KEY
        value: dev-internal-key-change-in-production

  # React Frontend
  - type: web
    name: resume-analyzer-frontend
    env: node
    plan: free
    region: ohio
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          name: resume-analyzer-backend
          type: web
          property: host

        # Adjust property to include /api suffix in the app config if needed, 
        # but here we use the host and we'll handle the '/api' in config.js or env.
