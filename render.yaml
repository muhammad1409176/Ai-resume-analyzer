services:
  # Java Backend
  - type: web
    name: resume-analyzer-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: AI_SERVICE_URL
        fromService:
          name: resume-analyzer-ai-service
          type: web
          property: host

  # Python AI Service
  - type: web
    name: resume-analyzer-ai-service
    env: docker
    dockerContext: ai-service
    dockerfilePath: ai-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: AI_SERVICE_KEY
        generateValue: true
