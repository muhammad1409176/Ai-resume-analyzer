spring.application.name=resume-analyzer
logging.level.root=INFO
logging.level.com.musaib.resumeanalyzer=DEBUG

# H2 File Database (persistent across restarts)
spring.datasource.url=jdbc:h2:mem:resumedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev only - disable in production)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port
server.port=${PORT:8080}

# JWT Configuration (MUST set JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:dev-jwt-secret-placeholder-change-me}
jwt.expiration=86400000

# AI Service Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
# Shared secret between backend and AI service (MUST set AI_SERVICE_KEY env var in production)
ai.service.key=${AI_SERVICE_KEY:dev-ai-key-placeholder-change-me}

# Actuator monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always